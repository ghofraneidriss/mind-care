<app-header></app-header>
<main class="fo-page">
  <section class="fo-hero">
    <h1>Patient Forums</h1>
    <p>Explore discussions, ask questions, and share your experience with the community.</p>
  </section>

  <section class="fo-list">
    <article class="fo-card" *ngFor="let topic of trendingTopics">
      <h3>{{ topic.title }}</h3>
      <p>{{ topic.comments }} comments</p>
      <a href="javascript:void(0)">Open discussion</a>
    </article>
  </section>
</main>
<app-footer></app-footer>
