<div class="bo-layout">
  <aside class="mr-sidebar">
    <div class="sidebar-brand">
      <a routerLink="/admin" class="brand-link">
        <span class="brand-icon"><i class="fi fi-rr-heart-rate"></i></span>
        <span class="brand-text">MindCare</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-heading">Main Menu</span>
      <a routerLink="/admin" class="nav-link"><i class="fi fi-rr-house-blank"></i><span>Dashboard</span></a>
      <a routerLink="/admin/medical-reports" class="nav-link"><i class="fi fi-rr-document"></i><span>Medical Reports</span></a>
      <a routerLink="/admin/files-management" class="nav-link"><i class="fi fi-rr-folder-open"></i><span>Files Management</span></a>
      <a routerLink="/admin/activities" class="nav-link"><i class="fi fi-rr-list-check"></i><span>Activities</span></a>
      <a routerLink="/admin/forums" class="nav-link"><i class="fi fi-rr-comment-alt"></i><span>Forums</span></a>
      <a routerLink="/admin/incidents" class="nav-link"><i class="fi fi-rr-shield-exclamation"></i><span>Incidents</span></a>
      <a routerLink="/admin/movement" class="nav-link active"><i class="fi fi-rr-running"></i><span>Movement</span></a>
    </nav>
  </aside>

  <main class="bo-page">
    <section class="bo-hero">
      <h1>Movement Monitoring</h1>
      <p>Track activity and rehabilitation movement sessions in real time.</p>
    </section>

    <section class="bo-card">
      <h3>Latest Movement Feed</h3>
      <div class="row-item" *ngFor="let item of movementFeed">
        <div>
          <strong>{{ item.patient }}</strong>
          <p>{{ item.type }} • {{ item.progress }}</p>
        </div>
        <span class="time">{{ item.time }}</span>
      </div>
    </section>
  </main>
</div>
