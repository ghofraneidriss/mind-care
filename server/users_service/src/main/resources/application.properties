spring.application.name=users-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/alzheimer_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.docker.compose.enabled=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =====================================================
# Eureka Client — enregistrement auprès du serveur
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# =====================================================
# Groq API Key (Chatbot - Llama 3)
# Get your free key at: https://console.groq.com
# =====================================================
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}
