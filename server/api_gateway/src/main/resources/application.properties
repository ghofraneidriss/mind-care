spring.application.name=api-gateway
server.port=8085

# =====================================================
# Eureka Client — s'enregistre + récupère le registre
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =====================================================
# Routes de l'API Gateway (configuration dynamique)
# lb:// = Load Balancer via Eureka (configuration dynamique)
# Le nom après lb:// doit correspondre au spring.application.name du microservice
# =====================================================

# --- Forums Service (port 8086, name: forums-service) ---
spring.cloud.gateway.routes[0].id=FORUMS_POSTS
spring.cloud.gateway.routes[0].uri=lb://forums-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/posts/**

spring.cloud.gateway.routes[1].id=FORUMS_CATEGORIES
spring.cloud.gateway.routes[1].uri=lb://forums-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[2].id=FORUMS_COMMENTS
spring.cloud.gateway.routes[2].uri=lb://forums-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/comments/**

# --- Incident Service (port 8087, name: incident-service) ---
spring.cloud.gateway.routes[3].id=INCIDENT_INCIDENTS
spring.cloud.gateway.routes[3].uri=lb://incident-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/incidents/**

spring.cloud.gateway.routes[4].id=INCIDENT_TYPES
spring.cloud.gateway.routes[4].uri=lb://incident-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/incident-types/**

# --- Users Service (port 8081, name: users-service) ---
spring.cloud.gateway.routes[5].id=USERS
spring.cloud.gateway.routes[5].uri=lb://users-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/users/**

# =====================================================
# Logs de routage (pour visualiser le Load Balancing)
# Partie 3.2a du cours : affiche quelle instance Eureka est sélectionnée
# =====================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
